<!DOCTYPE html>
<html>
    <head>

        <title>Cálculo da porcentagem de gay</title>

        <link rel="stylesheet" type="text/css" href="styles.css">
        
        <script type="text/Javascript">
            function sum(x, y) {
                return x + y;
            }
        </script>
    </head>
    <body>
    <h1>Ola mundo</h1>
        <form action="/home/suares/web_mobile/aula-1.html" method="post">

            <label for="login">Login:</label>

            <br>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">
            <br>
            Gênero:

            <button type="button" onclick="alert('RECEBA')">Verificar</button>
